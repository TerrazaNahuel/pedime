services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pedime
      POSTGRES_USER: pedime
      POSTGRES_PASSWORD: pedime123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pedime -d pedime"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pedime:pedime123@db:5432/pedime
      SECRET_KEY: desa-secret-key-no-usar-en-produccion
      ENVIRONMENT: development
      SITE_URL: http://localhost:8000
    volumes:
      - .:/app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
