services:
  - type: web
    name: pedime
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pedime-db
          property: connectionString
      - key: SITE_URL
        value: https://pedime.onrender.com
      - key: VIP_BASICO_PRICE
        value: "12999"
      - key: VIP_PREMIUM_PRICE
        value: "30000"
      - key: PREMIUM_DURATION_DAYS
        value: "30"
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: DEMO_PASSWORD
        sync: false
      - key: MAX_PRODUCTS_PER_CATEGORY
        value: "10"
      - key: MAX_CATEGORIES_FREE
        value: "5"
      - key: MAX_CATEGORIES_VIP
        value: "15"
      - key: LOGIN_MAX_ATTEMPTS
        value: "5"
      - key: REGISTER_MAX_ATTEMPTS
        value: "3"
      - key: MAX_VARIANTS
        value: "10"

databases:
  - name: pedime-db
    databaseName: pedime
    plan: free
