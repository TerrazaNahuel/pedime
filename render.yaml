services:
  - type: web
    name: pedime
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pedime-db
          property: connectionString

databases:
  - name: pedime-db
    databaseName: pedime
    plan: free
