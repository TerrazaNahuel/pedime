services:
  - type: web
    name: pedime
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pedime-db
          property: connectionString
      - key: SITE_URL
        value: https://pedime.onrender.com
      - key: PREMIUM_PRICE_MONTHLY
        value: "12000"
      - key: PREMIUM_PRICE_YEARLY
        value: "90000"
      - key: PREMIUM_DURATION_DAYS
        value: "30"

databases:
  - name: pedime-db
    databaseName: pedime
    plan: free
