<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- El título se actualiza dinámicamente vía cart.js -->
    <title>Cargando...</title>
    <!-- Tailwind CSS local -->
    <script src="/static/js/tailwind.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: '#10b981',
                    }
                }
            }
        }
    </script>
    <style id="custom-style">
        /* Variables CSS para colores dinámicos del comercio */
        :root { --accent: #10b981; }
        .bg-accent, .bg-emerald-500 { background-color: var(--accent) !important; }
        .hover\:bg-accent:hover, .hover\:bg-emerald-600:hover { background-color: var(--accent); filter: brightness(0.8); background-color: color-mix(in srgb, var(--accent) 80%, black) !important; }
        .text-accent, .text-emerald-400 { color: var(--accent) !important; }
        .border-accent, .border-emerald-500 { border-color: var(--accent) !important; }
        .shadow-accent, .shadow-emerald-500\/25 { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); box-shadow: 0 4px 6px -1px color-mix(in srgb, var(--accent) 25%, transparent) !important; }
    </style>
    <style>
        @media print {
            body { background: white !important; color: black !important; }
            #app { max-width: 100% !important; padding-bottom: 0 !important; }
            header, #search-section, #category-nav, #cart-fab, #cart-drawer, #toast, .print\:hidden { display: none !important; }
            #menu-content { display: block !important; padding: 0 !important; }
            .category-section { break-inside: avoid; page-break-inside: avoid; margin-bottom: 1.5rem; }
            .category-section h2 { color: #111 !important; font-size: 1.25rem; border-bottom: 2px solid #333; padding-bottom: 0.25rem; }
            .product-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 0.25rem 0; border-bottom: 1px dashed #ccc; }
            .product-item .product-name { font-weight: 600; }
            .product-item .product-desc { font-size: 0.8rem; color: #555 !important; }
            .product-item .product-price { font-weight: 700; white-space: nowrap; }
            .print-header { display: block !important; text-align: center; margin-bottom: 1rem; }
            .print-header img { max-width: 80px; margin: 0 auto 0.5rem; }
            .print-header h1 { font-size: 1.5rem; font-weight: bold; color: #111; }
            #loading, #error { display: none !important; }
            .featured-badge { display: inline-block; }
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white font-sans antialiased">
    <div id="app" class="max-w-lg mx-auto min-h-screen relative pb-24">
        <!-- Header sticky con logo y nombre del store -->
        <header class="sticky top-0 z-30 bg-[#0a0a0a]/95 backdrop-blur-sm border-b border-white/5 p-4">
            <div id="store-info" class="flex items-center gap-3">
                <img id="store-logo" class="hidden w-10 h-10 rounded-xl object-cover shrink-0" alt="Logo">
                <div>
                    <h1 id="store-name" class="text-xl font-bold text-white">—</h1>
                    <div id="store-meta" class="hidden mt-1.5 flex flex-wrap gap-x-3 gap-y-1 text-xs text-gray-500"></div>
                </div>
                <button id="print-btn" class="ml-auto text-gray-500 hover:text-accent transition print:hidden" title="Imprimir / PDF" onclick="window.print()">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Print-only header -->
        <div class="print-header hidden">
            <img id="print-logo" class="hidden max-h-20 mx-auto mb-2" alt="Logo">
            <h1 id="print-title">—</h1>
        </div>

        <!-- Spinner de carga -->
        <div id="loading" class="flex items-center justify-center py-20">
            <div class="animate-spin h-8 w-8 border-4 border-accent border-t-transparent rounded-full"></div>
        </div>

        <!-- Barra de búsqueda -->
        <div id="search-section" class="hidden px-4 pt-3">
            <input id="search-input" type="text" placeholder="Buscar productos..."
                   class="w-full bg-[#1a1a1a] border border-white/10 rounded-xl px-4 py-2.5 text-white placeholder-gray-600 focus:outline-none focus:border-accent transition text-sm">
        </div>

        <!-- Navegación por categorías (scroll horizontal) -->
        <div id="category-nav" class="hidden px-4 pt-3 overflow-x-auto scrollbar-hide">
            <div id="category-pills" class="flex gap-2 whitespace-nowrap"></div>
        </div>

        <!-- Contenedor del menú (productos por categoría) -->
        <div id="menu-content" class="hidden px-4 py-4 space-y-6"></div>

        <!-- Pantalla de error (slug inválido) -->
        <div id="error" class="hidden text-center py-20 px-4">
            <p class="text-4xl mb-2">😕</p>
            <p class="text-gray-400">No encontramos este comercio</p>
            <a href="/" class="inline-block mt-4 text-accent hover:brightness-110">Volver</a>
        </div>

        <!-- Toast de "agregado al carrito" -->
        <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 hidden">
            <div class="bg-accent text-white text-sm font-medium px-4 py-2 rounded-xl shadow-lg">Agregado al carrito</div>
        </div>

        <!-- FAB del carrito (flotante, centrado abajo) -->
        <div id="cart-fab" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-40 hidden">
            <button id="cart-btn" class="bg-accent hover:bg-accent text-white font-bold py-3 px-6 rounded-full shadow-lg shadow-accent transition flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z" />
                </svg>
                <span>Ver pedido</span>
                <span id="cart-count" class="bg-white text-accent text-xs font-bold px-2 py-0.5 rounded-full" style="color:var(--accent)">0</span>
            </button>
        </div>

        <!-- Drawer lateral del carrito (slide-up) -->
        <div id="cart-drawer" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-black/60" id="cart-overlay"></div>
            <div class="absolute bottom-0 left-0 right-0 bg-[#1a1a1a] rounded-t-2xl max-h-[80vh] md:max-h-[90vh] flex flex-col">
                <div class="flex items-center justify-between p-4 border-b border-white/10 shrink-0">
                    <h2 class="text-lg font-bold">Tu pedido</h2>
                    <button id="cart-close" class="text-gray-400 hover:text-white p-1">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>

                <!-- Selector de entrega (domicilio / retiro) -->
                <div id="delivery-section" class="hidden shrink-0 px-4 pt-3 pb-2 border-b border-white/5"></div>

                <!-- Items del carrito -->
                <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

                <!-- Comentario del pedido -->
                <div id="comment-section" class="hidden shrink-0 px-4 pb-3 pt-1 border-b border-white/5"></div>

                <!-- Footer con total y botón de WhatsApp -->
                <div class="p-4 border-t border-white/10 space-y-3 shrink-0">
                    <div id="payment-section" class="hidden"></div>

                    <div class="flex justify-between text-lg font-bold">
                        <span>Total</span>
                        <span id="cart-total">$0</span>
                    </div>
                    <button id="whatsapp-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                        </svg>
                        Enviar pedido por WhatsApp
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- Script principal del carrito con cache-busting -->
    <script src="/static/js/cart.js?v=4"></script>
</body>
</html>
